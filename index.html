<main style="max-width: 1200px; margin: 0 auto; padding: 20px; color: #ffffff; font-family: 'Segoe UI', sans-serif;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px;">UHA Tournament Dashboard</h1>
        <div id="connection-status" style="font-size: 12px; color: #888;">Connecting to Firebase...</div>
    </div>

    <section id="public-viewer" style="display:none; background: #1e1e1e; padding: 25px; border-radius: 12px; border-top: 4px solid #3498db; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <h2 style="margin-top: 0; color: #3498db;">Live Tournament Brackets</h2>
        <select id="public-tournament-selector" style="width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 20px;">
            <option value="active">Current Live Tournament</option>
        </select>
        <div id="public-bracket-container" style="padding: 20px; text-align: center; color: #888;">Loading brackets...</div>
    </section>

    <section id="admin-dashboard" style="display: flex; gap: 20px; align-items: flex-start;">
        
        <div class="uha-card" style="flex: 1; background: #1e1e1e; padding: 25px; border-radius: 12px; border-left: 4px solid #3498db; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: #fff;">1. Config & Wildcards</h3>
            
            <div style="margin: 20px 0;">
                <button class="uha-btn" id="btn-mode-singles" style="background: #3498db; border: none; padding: 10px 20px; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Singles</button>
                <button class="uha-btn" id="btn-mode-doubles" style="background: #333; border: none; padding: 10px 20px; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 5px;">Doubles</button>
            </div>
            
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <input type="text" id="wildcard-name" placeholder="Wildcard Name..." style="flex:2; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">
                <input type="number" id="wildcard-elo" placeholder="ELO" value="1000" style="width: 70px; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">
                <button id="btn-add-wildcard" style="background: #444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">+ Add</button>
            </div>

            <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px; color: #fff;">2. Lock Division</h3>
            <div style="display: flex; flex-direction: column; gap: 10px; margin: 15px 0;">
                <input type="text" id="division-name" placeholder="e.g., Open, A, B..." value="Open Division" style="padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">
                <select id="tourney-type" style="padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">
                    <option value="round_robin">Round Robin</option>
                    <option value="single_elim">Knockout Bracket</option>
                </select>
            </div>
            
            <button id="btn-lock-division" style="width: 100%; padding: 14px; background-color: #f1c40f; color: #000; font-weight: 800; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase;">Lock Current Division</button>
            <div id="locked-divisions-list" style="color: #3498db; font-size: 13px; margin-top: 15px; font-weight: bold;"></div>

            <button id="btn-start" style="width: 100%; padding: 14px; background-color: #3498db; color: #fff; font-weight: 800; border: none; border-radius: 6px; cursor: pointer; margin-top: 25px; text-transform: uppercase;">Preview & Push to Live</button>
        </div>

        <div style="flex: 2; display: flex; gap: 20px;">
            <div class="uha-card" style="flex: 1; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <h3 style="margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;">Roster</h3>
                <input type="text" id="player-search" placeholder="Search roster..." style="width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box;">
                <div id="player-list" style="max-height: 500px; overflow-y: auto; padding-right: 5px;"></div>
            </div>

            <div class="uha-card" style="flex: 1; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <h3 style="margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;">Drafted Teams</h3>
                <div id="team-draft-area" style="min-height: 200px;"></div>
            </div>
        </div>
    </section>

    <section id="tournament-view" style="display:none; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <h2 id="tourney-title" style="margin-top: 0; color: #3498db;">Tournament Preview</h2>
        <div id="matchup-container"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding: 12px 25px; background: #444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Reset / Back to Setup</button>
    </section>

</main>
