<main style="max-width: 1200px; margin: 0 auto; padding: 20px; color: #ffffff;">
    
    <section id="public-viewer" style="display:none; background: #1e1e1e; padding: 25px; border-radius: 8px; border-top: 3px solid var(--uha-blue, #3498db);">
        <h2 style="margin-top: 0; color: var(--uha-blue, #3498db);">Live Tournament Brackets</h2>
        <select id="public-tournament-selector" style="width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; margin-bottom: 20px;">
            <option value="active">Current Live Tournament</option>
            </select>
        <div id="public-bracket-container" style="padding: 20px; text-align: center; color: #888;">Loading brackets...</div>
    </section>

    <section id="admin-dashboard" style="display: flex; gap: 20px; align-items: flex-start;">
        
        <div style="flex: 1; background: #1e1e1e; padding: 25px; border-radius: 8px; border-left: 3px solid var(--uha-blue, #3498db);">
            
            <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">1. Config & Wildcards</h3>
            <div style="margin-bottom: 20px;">
                <button class="uha-btn" id="btn-mode-singles" style="background: var(--uha-blue, #3498db); border: none; padding: 8px 15px; color: white; border-radius: 4px; cursor: pointer;">Singles</button>
                <button class="uha-btn" id="btn-mode-doubles" style="background: #333; border: none; padding: 8px 15px; color: white; border-radius: 4px; cursor: pointer;">Doubles</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="wildcard-name" placeholder="Wildcard Name..." style="flex:2; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px;">
                <input type="number" id="wildcard-elo" placeholder="ELO" value="1000" style="flex:1; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px;">
                <button id="btn-add-wildcard" style="flex:1; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer;">+ Add</button>
            </div>

            <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px;">2. Lock Division</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="division-name" placeholder="e.g., Open, A, B..." value="Open Division" style="flex:1; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px;">
                <select id="tourney-type" style="flex:1; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px;">
                    <option value="round_robin">Round Robin</option>
                    <option value="single_elim">Knockout Bracket</option>
                </select>
            </div>
            
            <button id="btn-lock-division" style="width: 100%; padding: 12px; background-color: var(--uha-gold, #f1c40f); color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px;">Lock Current Division</button>
            <div id="locked-divisions-list" style="color: #aaa; font-size: 14px; min-height: 40px;"></div>

            <button id="btn-start" style="width: 100%; padding: 12px; background-color: var(--uha-blue, #3498db); color: #fff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px;">Preview & Push to Live</button>
        </div>

        <div style="flex: 2; display: flex; gap: 20px;">
            <div style="flex: 1; background: #1e1e1e; padding: 20px; border-radius: 8px;">
                <h3 style="margin-top: 0;">Roster</h3>
                <input type="text" id="player-search" placeholder="Search roster..." style="width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box;">
                <div id="player-list" style="max-height: 500px; overflow-y: auto;"></div>
            </div>

            <div style="flex: 1; background: #1e1e1e; padding: 20px; border-radius: 8px;">
                <h3 style="margin-top: 0;">Drafted Teams</h3>
                <div id="team-draft-area" style="min-height: 200px;"></div>
            </div>
        </div>
    </section>

    <section id="tournament-view" style="display:none; background: #1e1e1e; padding: 25px; border-radius: 8px;">
        <h2 id="tourney-title" style="margin-top: 0; color: var(--uha-blue, #3498db);">Tournament Preview</h2>
        <div id="matchup-container"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding: 10px 20px; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer;">Reset / Back to Setup</button>
    </section>

</main>
